apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: seaweedfs-operator
    namespace: seaweedfs
spec:
    interval: 30m
    chart:
        spec:
            chart: seaweedfs-operator
            sourceRef:
                kind: HelmRepository
                name: seaweedfs-repo
                namespace: seaweedfs
            interval: 12h

    values:
        webhook:
            enabled: true
