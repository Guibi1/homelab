apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: reflector
    namespace: reflector
spec:
    interval: 30m
    chart:
        spec:
            chart: reflector
            version: "10.0.37"
            sourceRef:
                kind: HelmRepository
                name: reflector-repo
                namespace: reflector
            interval: 12h
