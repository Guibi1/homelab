apiVersion: apps/v1
kind: Deployment
metadata:
    name: pocket-id
    namespace: pocket-id
spec:
    selector:
        matchLabels:
            app: pocket-id
    template:
        metadata:
            labels:
                app: pocket-id
        spec:
            containers:
                - name: pocket-id
                  image: ghcr.io/11notes/pocket-id:2.7.0-amd64
                  imagePullPolicy: Always
                  securityContext:
                      runAsUser: 10001
                      runAsGroup: 10001
                      runAsNonRoot: true
                      readOnlyRootFilesystem: true
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop: ["ALL"]
                  livenessProbe:
                      tcpSocket:
                          port: 1411
                      initialDelaySeconds: 0
                      failureThreshold: 3
                      timeoutSeconds: 1
                      periodSeconds: 10
                  readinessProbe:
                      tcpSocket:
                          port: 1411
                      initialDelaySeconds: 0
                      failureThreshold: 3
                      timeoutSeconds: 1
                      periodSeconds: 10
                  startupProbe:
                      tcpSocket:
                          port: 1411
                      initialDelaySeconds: 0
                      failureThreshold: 30
                      timeoutSeconds: 1
                      periodSeconds: 5
                  resources:
                      limits:
                          cpu: "0.25"
                          memory: "256Mi"
                      requests:
                          cpu: "0.1"
                          memory: "128Mi"
                  ports:
                      - name: webui
                        containerPort: 1411
                        protocol: TCP
                  env:
                      - name: APP_URL
                        value: https://auth.guibi.dev
                      - name: TRUSTED_PLATFORM
                        value: CF-Connecting-IP
                      - name: ENCRYPTION_KEY_FILE
                        value: "/app/data/encryption.key"
                      - name: DB_CONNECTION_STRING
                        valueFrom:
                            secretKeyRef:
                                name: pocket-id-cluster-app
                                key: uri
                  volumeMounts:
                      - name: data
                        mountPath: "/app/data"

            volumes:
                - name: data
                  hostPath:
                      path: "/mnt/SSD/app-storage/pocket-id"
                      type: Directory

            securityContext:
                seccompProfile:
                    type: RuntimeDefault
