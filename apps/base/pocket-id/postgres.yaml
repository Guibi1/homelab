apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
    name: pocket-id-cluster
    namespace: pocket-id
spec:
    description: "Pocket ID cluster"
    imageName: ghcr.io/cloudnative-pg/postgresql:17.4
    instances: 3
    startDelay: 300
    stopDelay: 300
    primaryUpdateStrategy: unsupervised
    enableSuperuserAccess: true

    postgresql:
        parameters:
            shared_buffers: 256MB
            pg_stat_statements.max: "10000"
            pg_stat_statements.track: all
            auto_explain.log_min_duration: "10s"

    bootstrap:
        initdb:
            database: pocket-id
            owner: pocket-id

    storage:
        size: 2Gi

    walStorage:
        size: 1Gi

    resources:
        requests:
            memory: "512Mi"
            cpu: 50m
        limits:
            memory: "1Gi"
            cpu: 1000m

    plugins:
        - name: barman-cloud.cloudnative-pg.io
          isWALArchiver: true
          parameters:
              barmanObjectName: cloudnative-pg-backups-store
              serverName: pocket-id-cluster

    monitoring:
        enablePodMonitor: true

    affinity:
        enablePodAntiAffinity: true
        topologyKey: failure-domain.beta.kubernetes.io/zone

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
    name: pocket-id-cluster-backup
    namespace: pocket-id
spec:
    schedule: "0 0 0 * * *"
    backupOwnerReference: self
    cluster:
        name: pocket-id-cluster
    method: plugin
    pluginConfiguration:
        name: barman-cloud.cloudnative-pg.io

---
apiVersion: v1
kind: Secret
metadata:
    name: cnpg-minio-tenant-credentials
    namespace: pocket-id
    annotations:
        reflector.v1.k8s.emberstack.com/reflects: "cnpg/cnpg-minio-tenant-credentials"
type: Opaque
data: {}

---
apiVersion: v1
kind: Secret
metadata:
    name: cnpg-minio-tenant-ca-tls
    namespace: pocket-id
    annotations:
        reflector.v1.k8s.emberstack.com/reflects: "cnpg/cnpg-minio-tenant-ca-tls"
type: kubernetes.io/tls
data: {}

---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
    name: cloudnative-pg-backups-store
    namespace: pocket-id
spec:
    retentionPolicy: "14d"
    configuration:
        destinationPath: s3://cnpg-backups/
        endpointURL: https://minio.cnpg.svc.cluster.local
        endpointCA:
            name: cnpg-minio-tenant-ca-tls
            key: ca.crt
        s3Credentials:
            accessKeyId:
                name: cnpg-minio-tenant-credentials
                key: CONSOLE_ACCESS_KEY
            secretAccessKey:
                name: cnpg-minio-tenant-credentials
                key: CONSOLE_SECRET_KEY
        data:
            compression: snappy
        wal:
            compression: snappy
            maxParallel: 8
