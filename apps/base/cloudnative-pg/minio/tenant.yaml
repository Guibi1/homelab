apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: cnpg-minio-tenant
    namespace: cnpg
spec:
    releaseName: cnpg-minio-tenant
    chart:
        spec:
            chart: tenant
            sourceRef:
                kind: HelmRepository
                name: minio-repo
                namespace: minio
    interval: 50m
    install:
        remediation:
            retries: 3

    values:
        tenant:
            name: cnpg-minio-tenant
            buckets:
                - name: nextcloud
                - name: vaultwarden

            configSecret:
                name: cnpg-minio-tenant-config
                accessKey: cnpg-minio-tenant
                secretKey: cnpg-minio-tenant

            users:
                - name: cnpg-minio-tenant-credentials

            certificate:
                requestAutoCert: false
                externalCertSecret:
                    - name: cnpg-minio-tenant-tls
                      type: cert-manager.io/v1

            prometheusOperator: true

            metrics:
                enabled: true
                port: 9000
                protocol: http

            pools:
                - name: pool
                  servers: 3
                  storageClassName: openebs-zfspv
                  size: 50Gi

---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
    name: cnpg-minio-tenant-credentials
    namespace: cnpg
    annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "pocket-id"
data:
    CONSOLE_ACCESS_KEY: Y25wZw==
    CONSOLE_SECRET_KEY: Y25wZzEyMzQ=
