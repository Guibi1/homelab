apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: cnpg-minio-tenant-ca-cert
    namespace: cnpg
spec:
    isCA: true
    commonName: cnpg-minio-tenant-ca
    secretName: cnpg-minio-tenant-ca-tls
    secretTemplate:
        annotations:
            reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
            reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "pocket-id"
            reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
            reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "pocket-id"
    duration: 70128h # 8y
    privateKey:
        algorithm: ECDSA
        size: 256
    issuerRef:
        group: cert-manager.io
        kind: ClusterIssuer
        name: issuer-selfsigned

---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
    name: cnpg-minio-tenant-ca-issuer
    namespace: cnpg
spec:
    ca:
        secretName: cnpg-minio-tenant-ca-tls

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: cnpg-minio-tenant-cert
    namespace: cnpg
spec:
    dnsNames:
        - "minio.cnpg"
        - "minio.cnpg.svc"
        - "minio.cnpg.svc.cluster.local"
        - "*.minio.cnpg.svc.cluster.local"
        - "*.cnpg-minio-tenant-hl.cnpg.svc.cluster.local"
        - "*.cnpg-minio-tenant.minio.cnpg.svc.cluster.local"
    secretName: cnpg-minio-tenant-tls
    issuerRef:
        name: cnpg-minio-tenant-ca-issuer
