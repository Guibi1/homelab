apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
    name: cnpg-seaweed
    namespace: cnpg
spec:
    image: chrislusf/seaweedfs:latest
    volumeServerDiskCount: 1

    master:
        replicas: 3
        volumeSizeLimitMB: 1024

    volume:
        replicas: 3
        storageClassName: openebs-zfspv

    filer:
        replicas: 2
        s3:
            enabled: true
        persistence:
            enabled: true
            storageClassName: openebs-zfspv
            resources:
                requests:
                    storage: 20Gi
        config: |
            [leveldb2]
            enabled = true
            dir = "/data/filerldb2"
