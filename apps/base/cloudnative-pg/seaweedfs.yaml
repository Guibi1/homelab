apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
    name: cnpg-seaweed
    namespace: cnpg
spec:
    image: chrislusf/seaweedfs:latest
    volumeServerDiskCount: 1

    master:
        replicas: 3
        volumeSizeLimitMB: 1024

    volume:
        replicas: 3
        storageClassName: openebs-zfspv

    s3:
        replicas: 3
