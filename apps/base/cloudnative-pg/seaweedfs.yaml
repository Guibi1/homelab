apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
    name: cnpg-seaweed
    namespace: cnpg
spec:
    image: chrislusf/seaweedfs:latest
    volumeServerDiskCount: 1

    global:
        seaweedfs:
            enableSecurity: false
            securityConfig:
                jwtSigning:
                    volumeWrite: false
                    volumeRead: false
                    filerWrite: false
                    filerRead: false

    master:
        replicas: 3
        volumeSizeLimitMB: 1024

    volume:
        replicas: 3
        storageClassName: openebs-zfspv
        requests:
            storage: 20Gi

    filer:
        replicas: 2
        s3:
            enabled: true
        iam: true
        config: |
            [leveldb2]
            enabled = true
            dir = "/data/filerldb2"
