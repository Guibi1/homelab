apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
    name: oidc-auth
    namespace: servarr
spec:
    plugin:
        traefikoidc:
            providerURL: https://auth.guibi.dev
            scopes: groups
            clientID: bf229943-0aa8-4a61-baa5-d229413c772d
            clientSecret: urn:k8s:secret:oidc-auth:CLIENT_SECRET
            sessionEncryptionKey: urn:k8s:secret:oidc-auth:SESSION_KEY
            callbackURL: /oauth/callback
            logoutURL: /oauth/logout
            postLogoutRedirectURI: /
            allowedRolesAndGroups: [admin]
            excludedURLs: [/health, /metrics]
