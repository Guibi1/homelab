apiVersion: apps/v1
kind: Deployment
metadata:
    name: prowlarr
    namespace: servarr
spec:
    selector:
        matchLabels:
            app: prowlarr
    template:
        metadata:
            labels:
                app: prowlarr
        spec:
            securityContext:
                fsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault

            containers:
                - name: prowlarr
                  image: ghcr.io/hotio/prowlarr:latest
                  imagePullPolicy: Always
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop: ["ALL"]
                  livenessProbe:
                      tcpSocket:
                          port: 9696
                      initialDelaySeconds: 0
                      failureThreshold: 3
                      timeoutSeconds: 1
                      periodSeconds: 10
                  readinessProbe:
                      tcpSocket:
                          port: 9696
                      initialDelaySeconds: 0
                      failureThreshold: 3
                      timeoutSeconds: 1
                      periodSeconds: 10
                  startupProbe:
                      tcpSocket:
                          port: 9696
                      initialDelaySeconds: 0
                      failureThreshold: 30
                      timeoutSeconds: 1
                      periodSeconds: 5
                  resources:
                      limits:
                          cpu: "0.5"
                          memory: "512Mi"
                      requests:
                          cpu: "0.25"
                          memory: "256Mi"
                  ports:
                      - name: webui
                        containerPort: 9696
                        protocol: TCP
                  env:
                      - name: PUID
                        value: "1000"
                      - name: PGID
                        value: "1000"
                      - name: UMASK
                        value: "002"
                      - name: TZ
                        value: "America/Toronto"
                      - name: PROWLARR__AUTH__APIKEY
                        value: 6ad80c0e1ce3f4c3a630e24d417708c4
                      - name: PROWLARR__SERVER__URLBASE
                        value: /prowlarr
                      - name: PROWLARR__AUTH__METHOD
                        value: External
                      - name: PROWLARR__POSTGRES__HOST
                        valueFrom:
                            secretKeyRef:
                                name: servarr-cluster-app
                                key: host
                      - name: PROWLARR__POSTGRES__PORT
                        valueFrom:
                            secretKeyRef:
                                name: servarr-cluster-app
                                key: port
                      - name: PROWLARR__POSTGRES__USER
                        valueFrom:
                            secretKeyRef:
                                name: servarr-cluster-app
                                key: user
                      - name: PROWLARR__POSTGRES__PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: servarr-cluster-app
                                key: password
                      - name: PROWLARR__POSTGRES__MAINDB
                        value: prowlarr
                      - name: PROWLARR__POSTGRES__LOGDB
                        value: prowlarr-logs

                  volumeMounts:
                      - name: config
                        mountPath: "/config"
                      - name: tmp
                        mountPath: "/tmp"

            volumes:
                - name: config
                  emptyDir: {}
                - name: tmp
                  emptyDir: {}
