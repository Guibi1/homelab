apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
    name: pocket-id-auth-sonarr
    namespace: apps
spec:
    plugin:
        oidc:
            issuer: https://auth.guibi.dev
            redirectUrl: /callback
            clientID: urn:k8s:secret:pocket-id-auth-sonarr:clientID
            clientSecret: urn:k8s:secret:pocket-id-auth-sonarr:clientSecret
            scopes:
                - openid
                - profile
                - email
