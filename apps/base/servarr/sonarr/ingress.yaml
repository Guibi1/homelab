apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
    name: sonarr-ingress
    namespace: servarr
spec:
    entryPoints:
        - websecure
    routes:
        - match: Host(`srv.guibi.dev`) && PathPrefix(`/sonarr`)
          kind: Rule
          services:
              - name: sonarr
                namespace: servarr
                port: 8989
                scheme: http
    tls:
        secretName: tls-certificate
