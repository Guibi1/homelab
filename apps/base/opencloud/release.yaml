apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: opencloud
    namespace: opencloud
spec:
    releaseName: opencloud
    chart:
        spec:
            chart: opencloud
            sourceRef:
                kind: HelmRepository
                name: opencloud-repo
                namespace: opencloud
    interval: 50m
    install:
        remediation:
            retries: 3
    values:
        global:
            domain:
                opencloud: cloud.guibi.dev
                oidc: auth.guibi.dev

        opencloud:
            persistence:
                config:
                    existingClaim: opencloud-config-pvc
                data:
                    existingClaim: opencloud-data-pvc

            storage:
                systemDriver: "decomposed"
                mode: "posixfs"
                posixfs:
                    idCacheStore: nats-js-kv
                    rootPath: "/var/lib/opencloud/storage"
                    persistence:
                        enabled: false
                s3:
                    enabled: false

            nats:
                external:
                    enabled: true
                    endpoint: nats.opencloud.svc.cluster.local:4222
                    cluster: opencloud-cluster

        oidc:
            enabled: false
            external:
                issuerUrl: https://auth.guibi.dev
                clientId: e4aeebbc-e388-47c9-8e62-2bb94cd7b685
                accountUrl: https://auth.guibi.dev/settings/account

        ingress:
            enabled: true
            annotations:
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
            tls:
                - secretName: tls-guibi.dev
                  hosts:
                      - cloud.guibi.dev
