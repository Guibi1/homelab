apiVersion: apps/v1
kind: Deployment
metadata:
    name: home-assistant
    namespace: home-assistant
spec:
    selector:
        matchLabels:
            app: home-assistant
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                app: home-assistant
        spec:
            securityContext:
                fsGroup: 1000
                supplementalGroups:
                    - 27 # dialout group for ttyUSB0
                seccompProfile:
                    type: RuntimeDefault

            containers:
                - name: home-assistant
                  image: ghcr.io/11notes/homeassistant:2026
                  imagePullPolicy: Always
                  securityContext:
                      runAsUser: 1000
                      runAsGroup: 1000
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop: ["ALL"]
                  livenessProbe:
                      tcpSocket:
                          port: 8123
                      initialDelaySeconds: 0
                      failureThreshold: 3
                      timeoutSeconds: 1
                      periodSeconds: 10
                  readinessProbe:
                      tcpSocket:
                          port: 8123
                      initialDelaySeconds: 0
                      failureThreshold: 3
                      timeoutSeconds: 1
                      periodSeconds: 10
                  startupProbe:
                      tcpSocket:
                          port: 8123
                      initialDelaySeconds: 0
                      failureThreshold: 30
                      timeoutSeconds: 1
                      periodSeconds: 5
                  resources:
                      limits:
                          cpu: "0.5"
                          memory: "512Mi"
                      requests:
                          cpu: "0.25"
                          memory: "256Mi"
                  ports:
                      - name: webui
                        containerPort: 8123
                        protocol: TCP
                  env:
                      - name: TZ
                        value: "America/Toronto"
                  volumeMounts:
                      - name: config
                        mountPath: "/homeassistant/etc"
                      - name: zigbee
                        mountPath: "/dev/ttyUSB0"

            volumes:
                - name: config
                  hostPath:
                      path: "/mnt/SSD/app-storage/home-assistant"
                      type: Directory
                - name: zigbee
                  hostPath:
                      path: "/dev/ttyUSB0"
                      type: CharDevice
