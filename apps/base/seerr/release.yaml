apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: seerr
    namespace: apps
spec:
    releaseName: seerr
    chart:
        spec:
            chart: seerr-chart
            sourceRef:
                kind: HelmRepository
                name: seerr-repo
                namespace: apps
    interval: 50m
    install:
        remediation:
            retries: 3
    values:
        config:
            persistence:
                existingClaim: seerr-config-pvc

        resources:
            requests:
                memory: "512Mi"
                cpu: 100m
            limits:
                memory: "2Gi"
                cpu: 2000m

        ingress:
            enabled: true
            annotations:
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - host: seerr.guibi.dev
                paths:
                  - path: /
                    pathType: ImplementationSpecific
            tls:
              - secretName: tls-guibi.dev
                hosts:
                  - seerr.guibi.dev
