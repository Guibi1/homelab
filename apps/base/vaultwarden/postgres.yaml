apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
    name: vaultwarden-cluster
    namespace: vaultwarden
spec:
    description: "Vaultwarden cluster"
    imageName: ghcr.io/cloudnative-pg/postgresql:17.4
    instances: 3
    startDelay: 300
    stopDelay: 300
    primaryUpdateStrategy: unsupervised
    enableSuperuserAccess: true

    postgresql:
        parameters:
            shared_buffers: 256MB
            pg_stat_statements.max: "10000"
            pg_stat_statements.track: all
            auto_explain.log_min_duration: "10s"

    bootstrap:
        initdb:
            database: vaultwarden
            owner: vaultwarden

    storage:
        size: 10Gi

    walStorage:
        size: 5Gi

    resources:
        requests:
            memory: "512Mi"
            cpu: 50m
        limits:
            memory: "1Gi"
            cpu: 1000m

    plugins:
        - name: barman-cloud.cloudnative-pg.io
          isWALArchiver: true
          parameters:
              barmanObjectName: cnpg-backups-store
              serverName: vaultwarden-cluster

    monitoring:
        enablePodMonitor: true

    affinity:
        enablePodAntiAffinity: true
        topologyKey: failure-domain.beta.kubernetes.io/zone

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
    name: vaultwarden-cluster-backup
    namespace: vaultwarden
spec:
    schedule: "0 0 0 * * *"
    backupOwnerReference: self
    cluster:
        name: vaultwarden-cluster
    method: plugin
    pluginConfiguration:
        name: barman-cloud.cloudnative-pg.io

---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
    name: cnpg-backups-store
    namespace: vaultwarden
spec:
    retentionPolicy: "14d"
    configuration:
        destinationPath: s3://cnpg-vaultwarden/
        endpointURL: http://cnpg-seaweed-filer.cnpg.svc.cluster.local:8333
        s3Credentials:
            accessKeyId:
                name: cnpg-backups-s3-credentials
                key: accessKey
            secretAccessKey:
                name: cnpg-backups-s3-credentials
                key: secretKey
        data:
            compression: snappy
        wal:
            compression: snappy
            maxParallel: 8
