apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
    name: vaultwarden-cluster
    namespace: cnpg
spec:
    description: "Vaultwarden cluster"
    imageName: ghcr.io/cloudnative-pg/postgresql:17.4
    instances: 3
    startDelay: 300
    stopDelay: 300
    primaryUpdateStrategy: unsupervised
    enableSuperuserAccess: true

    postgresql:
        parameters:
            shared_buffers: 256MB
            pg_stat_statements.max: "10000"
            pg_stat_statements.track: all
            auto_explain.log_min_duration: "10s"

    bootstrap:
        initdb:
            database: vaultwarden
            owner: vaultwarden
            secret:
                name: vaultwarden-cluster-secret

    storage:
        size: 10Gi

    walStorage:
        size: 5Gi

    resources:
        requests:
            memory: "512Mi"
            cpu: 50m
        limits:
            memory: "1Gi"
            cpu: 1000m

    plugins:
      - name: barman-cloud.cloudnative-pg.io
        isWALArchiver: true
        parameters:
            barmanObjectName: cloudnative-pg-backups-store
            serverName: vaultwarden-cluster

    monitoring:
        enablePodMonitor: true

    affinity:
        enablePodAntiAffinity: true
        topologyKey: failure-domain.beta.kubernetes.io/zone

---
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
    name: vaultwarden-cluster-secret
    namespace: cnpg
data:
    username: dmF1bHR3YXJkZW4=
    password: dmF1bHR3YXJkZW4=

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
    name: vaultwarden-cluster-backup
    namespace: cnpg
spec:
    backupOwnerReference: self
    cluster:
        name: vaultwarden-cluster
    method: plugin
    pluginConfiguration:
        name: barman-cloud.cloudnative-pg.io
