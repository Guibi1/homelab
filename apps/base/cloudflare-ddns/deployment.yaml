apiVersion: apps/v1
kind: Deployment
metadata:
    name: cloudflare-ddns
    namespace: cert-manager
spec:
    selector:
        matchLabels:
            app: cloudflare-ddns
    template:
        metadata:
            labels:
                app: cloudflare-ddns
        spec:
            containers:
                - name: cloudflare-ddns
                  image: favonia/cloudflare-ddns:latest
                  imagePullPolicy: Always
                  securityContext:
                      runAsUser: 10001
                      runAsGroup: 10001
                      runAsNonRoot: true
                      readOnlyRootFilesystem: true
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop: ["ALL"]
                  resources:
                      limits:
                          cpu: "0.25"
                          memory: "256Mi"
                      requests:
                          cpu: "0.1"
                          memory: "128Mi"
                  env:
                      - name: CLOUDFLARE_API_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: cloudflare-api-token-secret
                                key: api-token
                      - name: DOMAINS
                        value: "srv.guibi.dev"

            securityContext:
                seccompProfile:
                    type: RuntimeDefault
